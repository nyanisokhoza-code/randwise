<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RandWise — Reset Password</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#f7f6f2; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { background:white; border-radius:20px; padding:32px 28px; max-width:380px; width:100%; border:0.5px solid #e8e6de; }
  .logo { display:flex; align-items:center; gap:10px; margin-bottom:28px; }
  .logo-icon { width:40px; height:40px; background:#1a7a4a; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; }
  .logo-text { font-size:18px; font-weight:700; color:#2c2c2a; }
  h1 { font-size:22px; font-weight:800; color:#2c2c2a; margin-bottom:6px; }
  p { font-size:14px; color:#888780; margin-bottom:24px; line-height:1.5; }
  label { font-size:12px; font-weight:600; color:#5f5e5a; display:block; margin-bottom:6px; }
  .input-wrap { position:relative; margin-bottom:14px; }
  input { width:100%; padding:14px 16px; border-radius:12px; border:1.5px solid #e8e6de; font-size:15px; color:#2c2c2a; background:#f7f6f2; outline:none; font-family:inherit; }
  input:focus { border-color:#1a7a4a; }
  .toggle { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:13px; color:#888780; }
  .hint { font-size:11px; color:#b4b2a9; margin-top:4px; margin-bottom:16px; }
  .btn { width:100%; padding:15px; background:#1a7a4a; color:white; border:none; border-radius:14px; font-size:15px; font-weight:700; cursor:pointer; transition:opacity .15s; }
  .btn:hover { opacity:0.9; }
  .btn:disabled { background:#f0efe9; color:#b4b2a9; cursor:not-allowed; }
  .success { text-align:center; display:none; }
  .success-icon { font-size:56px; margin-bottom:16px; }
  .success h2 { font-size:22px; font-weight:800; color:#2c2c2a; margin-bottom:8px; }
  .success p { font-size:14px; color:#888780; margin-bottom:24px; }
  .success .btn { background:#1a7a4a; color:white; display:inline-block; text-decoration:none; padding:14px 28px; border-radius:14px; font-weight:700; font-size:14px; }
  .error-msg { font-size:13px; color:#a32d2d; background:#fdecea; border-radius:10px; padding:10px 14px; margin-bottom:14px; display:none; }
  .strength { height:4px; border-radius:2px; margin-top:6px; margin-bottom:14px; background:#e8e6de; overflow:hidden; }
  .strength-fill { height:100%; border-radius:2px; transition:width .3s,background .3s; width:0%; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🌱</div>
    <div class="logo-text">RandWise</div>
  </div>

  <div id="form-view">
    <h1>Set new password</h1>
    <p>Choose a strong password for your RandWise account.</p>

    <div class="error-msg" id="error-msg"></div>

    <label>New password</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="Minimum 8 characters" oninput="checkStrength()">
      <button class="toggle" onclick="togglePass('password', this)" type="button">Show</button>
    </div>
    <div class="strength"><div class="strength-fill" id="strength-fill"></div></div>

    <label>Confirm password</label>
    <div class="input-wrap">
      <input type="password" id="confirm" placeholder="Repeat your password" oninput="checkMatch()">
      <button class="toggle" onclick="togglePass('confirm', this)" type="button">Show</button>
    </div>
    <div class="hint" id="match-hint"></div>

    <button class="btn" id="submit-btn" onclick="resetPassword()" disabled>Set new password</button>
  </div>

  <div class="success" id="success-view">
    <div class="success-icon">✅</div>
    <h2>Password updated!</h2>
    <p>Your new password is set. Open the RandWise app and sign in with your email and new password.</p>
    <a href="https://nyanisokhoza-code.github.io/randwise" style="display:block;width:100%;padding:15px;background:#1a7a4a;color:white;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;margin-top:8px">Open RandWise →</a>
    <p style="font-size:12px;color:#b4b2a9;margin-top:12px">You can close this page.</p>
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://mmezkseblafurjolkfkt.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1tZXprc2VibGFmdXJqb2xrZmt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNTI1NzEsImV4cCI6MjA5MDkyODU3MX0.iU7J7uK_EsFF9exZrABSxzy2U4n6iFtgh9RQnwbADpg';

// Extract access token from URL hash
const hash   = new URLSearchParams(window.location.hash.slice(1));
const token  = hash.get('access_token');
const type   = hash.get('type');

if (!token || type !== 'recovery') {
  document.getElementById('error-msg').style.display = 'block';
  document.getElementById('error-msg').textContent = 'Invalid or expired reset link. Please request a new one from the app.';
  document.getElementById('submit-btn').disabled = true;
}

function togglePass(id, btn) {
  const inp = document.getElementById(id);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = 'Hide'; }
  else { inp.type = 'password'; btn.textContent = 'Show'; }
}

function checkStrength() {
  const val = document.getElementById('password').value;
  const fill = document.getElementById('strength-fill');
  let score = 0;
  if (val.length >= 8)  score++;
  if (val.length >= 12) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const pct   = (score / 5) * 100;
  const color = score <= 1 ? '#a32d2d' : score <= 3 ? '#ba7517' : '#1a7a4a';
  fill.style.width = pct + '%';
  fill.style.background = color;
  checkMatch();
}

function checkMatch() {
  const p = document.getElementById('password').value;
  const c = document.getElementById('confirm').value;
  const hint = document.getElementById('match-hint');
  const btn  = document.getElementById('submit-btn');
  if (!c) { hint.textContent = ''; btn.disabled = true; return; }
  if (p === c && p.length >= 8) {
    hint.textContent = '✅ Passwords match';
    hint.style.color = '#1a7a4a';
    btn.disabled = false;
  } else if (p !== c) {
    hint.textContent = '❌ Passwords do not match';
    hint.style.color = '#a32d2d';
    btn.disabled = true;
  } else {
    hint.textContent = 'Minimum 8 characters';
    hint.style.color = '#b4b2a9';
    btn.disabled = true;
  }
}

async function resetPassword() {
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Updating...';
  try {
    // Step 1: Exchange recovery token for a session
    const sessionRes = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=recovery`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_ANON, 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token })
    });
    const session = await sessionRes.json();
    if (!session.access_token) throw new Error(session.error_description || 'Invalid or expired reset link. Please request a new one.');

    // Step 2: Update password using the fresh session token
    const updateRes = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      method: 'PUT',
      headers: {
        'apikey': SUPABASE_ANON,
        'Authorization': `Bearer ${session.access_token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ password })
    });

    if (!updateRes.ok) {
      const err = await updateRes.json();
      throw new Error(err.message || 'Update failed');
    }

    document.getElementById('form-view').style.display = 'none';
    document.getElementById('success-view').style.display = 'block';
  } catch (e) {
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'block';
    errEl.textContent = e.message || 'Something went wrong. Please request a new reset link.';
    btn.disabled = false;
    btn.textContent = 'Set new password';
  }
}
</script>
</body>
</html>
