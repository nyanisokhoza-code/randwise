<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyRandWise — Reset Password</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#f7f6f2; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { background:white; border-radius:20px; padding:32px 28px; max-width:380px; width:100%; border:0.5px solid #e8e6de; }
  .logo { display:flex; align-items:center; gap:10px; margin-bottom:28px; }
  .logo-icon { width:40px; height:40px; background:#1a7a4a; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; }
  .logo-text { font-size:18px; font-weight:700; color:#2c2c2a; }
  h1 { font-size:22px; font-weight:800; color:#2c2c2a; margin-bottom:6px; }
  p { font-size:14px; color:#888780; margin-bottom:24px; line-height:1.5; }
  label { font-size:12px; font-weight:600; color:#5f5e5a; display:block; margin-bottom:6px; }
  .input-wrap { position:relative; margin-bottom:14px; }
  input { width:100%; padding:14px 16px; border-radius:12px; border:1.5px solid #e8e6de; font-size:15px; color:#2c2c2a; background:#f7f6f2; outline:none; font-family:inherit; }
  input:focus { border-color:#1a7a4a; }
  .toggle { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:13px; color:#888780; }
  .hint { font-size:11px; color:#b4b2a9; margin-top:4px; margin-bottom:16px; }
  .btn { width:100%; padding:15px; background:#1a7a4a; color:white; border:none; border-radius:14px; font-size:15px; font-weight:700; cursor:pointer; transition:opacity .15s; }
  .btn:hover { opacity:0.9; }
  .btn:disabled { background:#f0efe9; color:#b4b2a9; cursor:not-allowed; }
  .success { text-align:center; display:none; }
  .success-icon { font-size:56px; margin-bottom:16px; }
  .success h2 { font-size:22px; font-weight:800; color:#2c2c2a; margin-bottom:8px; }
  .success p { font-size:14px; color:#888780; margin-bottom:24px; }
  .error-msg { font-size:13px; color:#a32d2d; background:#fdecea; border-radius:10px; padding:10px 14px; margin-bottom:14px; display:none; }
  .strength { height:4px; border-radius:2px; margin-top:6px; margin-bottom:14px; background:#e8e6de; overflow:hidden; }
  .strength-fill { height:100%; border-radius:2px; transition:width .3s,background .3s; width:0%; }
  .debug { font-size:11px; color:#888; background:#f0efe9; border-radius:8px; padding:8px 12px; margin-bottom:12px; word-break:break-all; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🌱</div>
    <div class="logo-text">MyRandWise</div>
  </div>

  <div id="form-view">
    <h1>Set new password</h1>
    <p>Choose a strong password for your MyRandWise account.</p>

    <div class="error-msg" id="error-msg"></div>

    <!-- DEBUG BOX — remove after confirmed working -->
    <div class="debug" id="debug-info">Loading...</div>

    <label>New password</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="Minimum 8 characters" oninput="checkStrength()">
      <button class="toggle" onclick="togglePass('password', this)" type="button">Show</button>
    </div>
    <div class="strength"><div class="strength-fill" id="strength-fill"></div></div>

    <label>Confirm password</label>
    <div class="input-wrap">
      <input type="password" id="confirm" placeholder="Repeat your password" oninput="checkMatch()">
      <button class="toggle" onclick="togglePass('confirm', this)" type="button">Show</button>
    </div>
    <div class="hint" id="match-hint"></div>

    <button class="btn" id="submit-btn" onclick="resetPassword()" disabled>Set new password</button>
  </div>

  <div class="success" id="success-view">
    <div class="success-icon">✅</div>
    <h2>Password updated!</h2>
    <p>Your new password is set. Open the MyRandWise app and sign in with your email and new password.</p>
    <a href="https://myrandwise.co.za" style="display:block;width:100%;padding:15px;background:#1a7a4a;color:white;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;margin-top:8px">Open MyRandWise →</a>
    <p style="font-size:12px;color:#b4b2a9;margin-top:12px">You can close this page.</p>
  </div>
</div>

<!-- Supabase JS SDK v2 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL  = 'https://mmezkseblafurjolkfkt.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1tZXprc2VibGFmdXJqb2xrZmt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNTI1NzEsImV4cCI6MjA5MDkyODU3MX0.iU7J7uK_EsFF9exZrABSxzy2U4n6iFtgh9RQnwbADpg';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const search        = new URLSearchParams(window.location.search);
const accessToken   = search.get('token');
const refreshToken  = search.get('refresh_token') || '';
const type          = search.get('type');
const dbg           = document.getElementById('debug-info');

dbg.textContent = 'token: ' + (accessToken ? accessToken.slice(0,20)+'...' : 'MISSING') + ' | type: ' + (type || 'MISSING');

async function init() {
  if (search.get('expired') === '1') {
    showError('⏰ This reset link has expired.<br><a href="https://myrandwise.co.za" style="color:#1a7a4a;font-weight:700">← Request a new one</a>');
    return;
  }

  if (!accessToken || type !== 'recovery') {
    showError('Invalid or expired reset link.<br><a href="https://myrandwise.co.za" style="color:#1a7a4a;font-weight:700">← Go back to app</a>');
    return;
  }

  // Establish the session with the token from the recovery link
  const { data, error } = await supabase.auth.setSession({
    access_token:  accessToken,
    refresh_token: refreshToken
  });

  if (error) {
    dbg.textContent += ' | setSession FAILED: ' + error.message;
    showError('This reset link has expired or already been used.<br><a href="https://myrandwise.co.za" style="color:#1a7a4a;font-weight:700">← Request a new one</a>');
  } else {
    dbg.textContent += ' | session OK ✅ user: ' + (data.user?.email || '?');
    // Session is live — enable the form
    document.getElementById('submit-btn').disabled = true; // stays disabled until passwords match
  }
}

init();

function showError(html) {
  const el = document.getElementById('error-msg');
  el.style.display = 'block';
  el.innerHTML = html;
  document.getElementById('submit-btn').disabled = true;
}

function togglePass(id, btn) {
  const inp = document.getElementById(id);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = 'Hide'; }
  else { inp.type = 'password'; btn.textContent = 'Show'; }
}

function checkStrength() {
  const val  = document.getElementById('password').value;
  const fill = document.getElementById('strength-fill');
  let score = 0;
  if (val.length >= 8)        score++;
  if (val.length >= 12)       score++;
  if (/[A-Z]/.test(val))      score++;
  if (/[0-9]/.test(val))      score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  fill.style.width      = (score / 5 * 100) + '%';
  fill.style.background = score <= 1 ? '#a32d2d' : score <= 3 ? '#ba7517' : '#1a7a4a';
  checkMatch();
}

function checkMatch() {
  const p    = document.getElementById('password').value;
  const c    = document.getElementById('confirm').value;
  const hint = document.getElementById('match-hint');
  const btn  = document.getElementById('submit-btn');
  if (!c) { hint.textContent = ''; btn.disabled = true; return; }
  if (p === c && p.length >= 8) {
    hint.textContent = '✅ Passwords match'; hint.style.color = '#1a7a4a'; btn.disabled = false;
  } else if (p !== c) {
    hint.textContent = '❌ Passwords do not match'; hint.style.color = '#a32d2d'; btn.disabled = true;
  } else {
    hint.textContent = 'Minimum 8 characters'; hint.style.color = '#b4b2a9'; btn.disabled = true;
  }
}

async function resetPassword() {
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('submit-btn');
  btn.disabled   = true;
  btn.textContent = 'Updating...';

  const { error } = await supabase.auth.updateUser({ password });

  if (error) {
    dbg.textContent += ' | updateUser error: ' + error.message;
    showError(error.message + '<br><a href="https://myrandwise.co.za" style="color:#1a7a4a;font-weight:700;font-size:12px">← Back to app</a>');
    btn.disabled    = false;
    btn.textContent = 'Set new password';
  } else {
    document.getElementById('form-view').style.display  = 'none';
    document.getElementById('success-view').style.display = 'block';
  }
}
</script>
</body>
</html>
